<!DOCTYPE html>
<html>
<head>
    <title>Simple Page</title>
</head>
<body>

<h1>Hello, World!</h1>
<p id="message">Click the button to change this text.</p>

<button onclick="changeText()">Click Me</button>

<script>
function changeText() {
    document.getElementById("message").innerHTML = "Text changed using JavaScript!";
}
</script>

</body>
</html>
